<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SDC Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: var(--bg);
    margin: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .login-container {
    background: var(--surface);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(19, 43, 80, 0.08);
    width: 100%;
    max-width: 400px;
    text-align: center;
    animation: fadeIn 0.6s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-logo {
    width: 60px;
    height: 60px;
    margin-bottom: 16px;
    object-fit: contain;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--navy-deep);
    margin: 0 0 8px 0;
    font-weight: 600;
  }
  .login-sub {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 30px;
  }
  .form-group {
    text-align: left;
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .form-control {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    box-sizing: border-box;
    transition: all 0.2s;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(164, 144, 99, 0.1);
  }
  .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
    margin-top: 10px;
  }
  .login-btn:hover {
    background: var(--navy-mid);
  }
  .login-error {
    color: var(--red);
    background: rgba(181, 59, 59, 0.1);
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  {% if error %}
  .login-error {
    display: block;
  }
  {% endif %}
</style>
</head>
<body>

<div class="login-container">
  <img src="https://i.ibb.co.com/7dGX4D40/images-removebg-preview.png" alt="Logo Kemenpar" class="login-logo">
  <h1 class="login-title">{% if admin_mode %}Panel Super Admin{% else %}SDC Monitor{% endif %}</h1>
  <div class="login-sub">{% if admin_mode %}Login Khusus Administrator{% else %}Sertifikasi Tenaga Kerja Pariwisata{% endif %}</div>
  
  <div class="login-error">{{ error }}</div>

  <form method="POST" action="{% if admin_mode %}/supadmin{% else %}/login{% endif %}">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" class="form-control" placeholder="nama@kemenpar.go.id" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="login-btn">Masuk</button>
  </form>
</div>

</body>
</html>
